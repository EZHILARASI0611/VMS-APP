{% extends "base.html" %}
{% block title %}{% if user %}Edit{% else %}Create{% endif %} User - {{ app_name }}{% endblock %}
{% block page_title %}{% if user %}Edit User{% else %}Create User{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card content-card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label required">Username</label>
                        <input type="text" class="form-control" name="username" value="{{ user.username if user else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label required">Email</label>
                        <input type="email" class="form-control" name="email" value="{{ user.email if user else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password {% if user %}(leave blank to keep current){% else %}*{% endif %}</label>
                        <input type="password" class="form-control" name="password" {% if not user %}required{% endif %}>
                    </div>
                    <div class="mb-3">
                        <label class="form-label required">Role</label>
                        <select class="form-select" name="role" required>
                            {% for r in ['admin', 'employee', 'receptionist'] %}
                            <option value="{{ r }}" {% if user and user.role == r %}selected{% endif %}>{{ r|title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    {% if user %}
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" name="is_active" id="is_active" {% if user.is_active_user %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">Active</label>
                    </div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
